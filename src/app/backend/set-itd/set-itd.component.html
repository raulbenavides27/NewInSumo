<ion-card>
  <ion-card-header>
    <ion-card-title>Crear ITD</ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <ion-item>
      <ion-label position="stacked">Fecha</ion-label>
      <ion-input [(ngModel)]="itd.fecha"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Folio</ion-label>
      <ion-input [(ngModel)]="itd.folio"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Seller</ion-label>
      <ion-input [(ngModel)]="itd.seller"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Documento</ion-label>
      <ion-input [(ngModel)]="itd.documento"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">OC/Pedido</ion-label>
      <ion-input [(ngModel)]="itd.ocPedido"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Seguimiento</ion-label>
      <ion-input [(ngModel)]="itd.seguimiento"></ion-input>
    </ion-item>

    <br />

    <ion-button expand="block" (click)="agregarProducto()">
      Agregar Producto
    </ion-button>

    <ion-card *ngFor="let producto of productos; let i = index">
      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">SKU</ion-label>
          <ion-input [(ngModel)]="producto.sku"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Descripción</ion-label>
          <ion-input [(ngModel)]="producto.descripcion"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Cantidad</ion-label>
          <ion-input type="number" [(ngModel)]="producto.cantidad"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Observación</ion-label>
          <ion-textarea [(ngModel)]="producto.observacion"></ion-textarea>
        </ion-item>

        <ion-button color="danger" expand="block" (click)="eliminarProducto(i)">
          Eliminar Producto
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-item>
      <ion-label position="stacked">Detalle Estado</ion-label>
      <ion-textarea [(ngModel)]="itd.detalleEstado"></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Conclusión</ion-label>
      <ion-textarea [(ngModel)]="itd.conclusion"></ion-textarea>
    </ion-item>

    <br />

    <ion-button expand="block" (click)="guardarITD()"> Guardar ITD </ion-button>
  </ion-card-content>
</ion-card>
